<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Flashcards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-menu" class="menu-container">
        <h1>Select Study Group</h1>
        <div class="menu-grid">
            <button class="menu-btn" onclick="showLevelOptions('N5')">JLPT N5</button>
            <button class="menu-btn" onclick="showLevelOptions('N4')">JLPT N4</button>
            <button class="menu-btn" onclick="showLevelOptions('N3')">JLPT N3</button>
        </div>
    </div>

    <div id="sub-menu" class="menu-container style-hidden">
        <h1 id="sub-menu-title">Select Study Group</h1>
        <div class="menu-grid">
            <button class="menu-btn" onclick="startGroup(0, 50)">1-50</button>
            <button class="menu-btn" onclick="startGroup(50, 100)">51-100</button>
            <button class="menu-btn" onclick="startCompoundGroup()">Compound words</button>
        </div>
        <button id="level-back-btn" class="menu-back-btn">Back to Menu</button>
    </div>

    <div id="flashcard-screen" class="card-container style-hidden">
        <button id="back-btn" class="flashcard-back-btn">Back to Menu</button>
        
        <div class="flashcard" id="flashcard">
            <div class="front" id="kanji-front">一</div>
            <div class="back">
                <div id="meaning-back"></div>
                <div id="examples-back" class="examples-section"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
